<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JIRA 效率助手 — 下载与安装</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
      color: #333;
      line-height: 1.7;
    }
    .container { max-width: 800px; margin: 0 auto; }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      margin-bottom: 24px;
      text-align: center;
    }
    .card h1 {
      font-size: 36px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .card .subtitle { color: #666; margin-bottom: 32px; }
    .browser-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 32px;
    }
    @media (max-width: 600px) { .browser-grid { grid-template-columns: 1fr; } }
    .browser-card {
      padding: 32px 24px;
      border-radius: 12px;
      text-decoration: none;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .browser-card.chrome {
      background: linear-gradient(135deg, #667eea15, #764ba215);
      border: 2px solid #667eea40;
    }
    .browser-card.chrome:hover {
      background: linear-gradient(135deg, #667eea25, #764ba225);
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(102,126,234,0.25);
    }
    .browser-card.firefox {
      background: linear-gradient(135deg, #ff950015, #ff6b3515);
      border: 2px solid #ff6b3540;
    }
    .browser-card.firefox:hover {
      background: linear-gradient(135deg, #ff950025, #ff6b3525);
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(255,107,53,0.25);
    }
    .browser-icon { font-size: 48px; margin-bottom: 12px; }
    .browser-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .browser-name.chrome { color: #667eea; }
    .browser-name.firefox { color: #ff6b35; }
    .browser-desc { font-size: 13px; color: #888; }
    .browser-card .badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      margin-top: 8px;
    }
    .browser-card .badge.green { background: #10b981; color: #fff; }
    .browser-card .badge.orange { background: #f59e0b; color: #fff; }
    .footer {
      text-align: center;
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      margin-top: 24px;
    }
    .info-bar {
      background: #eef;
      border-radius: 8px;
      padding: 16px;
      font-size: 13px;
      color: #555;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>JIRA 效率助手</h1>
      <p class="subtitle">飞书认证 · 模板管理 · 问题单合规审计 · 定时提醒 · 飞书通知</p>

      <div class="browser-grid">
        <a href="install.html" class="browser-card chrome">
          <div class="browser-icon">🌐</div>
          <div class="browser-name chrome">Chrome / Edge</div>
          <div class="browser-desc">基于 Chromium 的浏览器</div>
          <span class="badge green">✅ 支持自动更新</span>
        </a>
        <a href="install-firefox.html" class="browser-card firefox">
          <div class="browser-icon">🦊</div>
          <div class="browser-name firefox">Firefox</div>
          <div class="browser-desc">需 Firefox 128+</div>
          <span class="badge orange">⚠️ 需签名才能自动更新</span>
        </a>
      </div>

      <div class="info-bar">
        <strong>📌 自动更新说明</strong><br>
        Chrome：安装后每 5 小时自动检查更新，完全无感。<br>
        Firefox：需开发者通过 AMO 签名 xpi，用户安装签名版后才能自动更新。
      </div>
    </div>

    <div class="footer">
      JIRA 效率助手 v3.3.0 · 由 GitHub Pages 分发
    </div>
  </div>
</body>
</html>
